spring:
  application:
    name: pet-auth
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL}/realms/pet-auth
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL}/realms/pet-auth
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: pet-auth-client
            client-secret: blDWrYdZpZQE4nXzDerzKZp9gkD3dYNK
            scope: openid
server:
  port: 8080
logging:
  level:
    org.springframework.security: TRACE
